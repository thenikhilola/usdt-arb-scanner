          <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>USDT Arb Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080b10;color:#cdd6f4;font-family:'Share Tech Mono',monospace;min-height:100vh}
.raj{font-family:'Rajdhani',sans-serif}
:root{--g:#00ff9d;--gold:#ffd700;--red:#ff5555;--border:rgba(0,255,157,0.12)}
.card{background:linear-gradient(135deg,rgba(13,17,23,0.95),rgba(10,14,20,0.9));border:1px solid var(--border);border-radius:6px;position:relative;overflow:hidden}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,255,157,0.35),transparent)}
header{border-bottom:1px solid rgba(0,255,157,0.08);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;background:rgba(0,255,157,0.015)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#00ff9d,#00cc7a);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px}
.tabs{padding:10px 18px;display:flex;gap:6px;border-bottom:1px solid rgba(255,255,255,0.04);flex-wrap:wrap}
.tab{cursor:pointer;padding:7px 16px;border-radius:4px;font-size:11px;transition:all .2s;border:1px solid transparent;letter-spacing:.5px}
.tab.on{background:rgba(0,255,157,0.08);border-color:rgba(0,255,157,0.25);color:#00ff9d}
.tab.off{color:#444}
main{padding:18px;max-width:1100px;margin:0 auto}
.btn{border:none;cursor:pointer;border-radius:4px;font-family:'Share Tech Mono',monospace;transition:all .15s;font-size:11px}
.btn-g{background:linear-gradient(135deg,#00ff9d,#00cc7a);color:#000;font-weight:700;padding:8px 16px}
.btn-g:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,255,157,0.3)}
.btn-ghost{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:#888;padding:7px 13px}
.btn-danger{background:rgba(255,85,85,0.1);border:1px solid rgba(255,85,85,0.3);color:#ff5555;padding:7px 13px}
.pulse{animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.grid2{grid-template-columns:1fr}}
table{border-collapse:collapse;width:100%}
th,td{padding:8px 10px;text-align:left}
tr:hover td{background:rgba(255,255,255,.015)}
.inp{background:rgba(0,0,0,.5);border:1px solid rgba(0,255,157,.15);color:#cdd6f4;border-radius:4px;padding:8px 12px;font-family:'Share Tech Mono',monospace;font-size:12px;width:100%;outline:none}
.inp:focus{border-color:rgba(0,255,157,.45)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{width:420px;max-width:92vw;padding:26px}
.badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:700}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(0,255,157,.15);border-radius:2px}
.scanline{background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.02) 2px,rgba(0,0,0,.02) 4px);pointer-events:none;position:fixed;inset:0;z-index:9998}
input[type=range]{accent-color:#00ff9d;width:100%}
input[type=checkbox]{accent-color:#00ff9d}
@keyframes slideIn{from{transform:translateY(-5px);opacity:0}to{transform:translateY(0);opacity:1}}
.slide{animation:slideIn .2s ease-out}
</style>
</head>
<body>
<div class="scanline"></div>
<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div>
      <div class="raj" style="font-size:16px;font-weight:700;color:#00ff9d;letter-spacing:3px">USDT ARB SCANNER</div>
      <div style="font-size:9px;color:#333;letter-spacing:1px">MULTI-PLATFORM P2P ARBITRAGE MONITOR &nbsp;·&nbsp; <span id="modeLabel" style="color:#ffd700">● DEMO MODE</span></div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <div style="font-size:10px;color:#444;text-align:right">
      <span id="lastUpdated">NO DATA YET</span><br>
      <span id="platformCount" style="color:#333">0 PLATFORMS ACTIVE</span>
    </div>
    <button class="btn btn-ghost" onclick="fetchAll()">↺ REFRESH</button>
    <div style="display:flex;align-items:center;gap:5px;cursor:pointer" onclick="toggleAuto()">
      <div id="autoDot" style="width:8px;height:8px;border-radius:50%;background:#333"></div>
      <span id="autoLabel" style="font-size:10px;color:#444">PAUSED</span>
    </div>
  </div>
</header>
<div class="tabs">
  <div class="tab on" id="tab-dashboard" onclick="switchTab('dashboard')">📊 DASHBOARD</div>
  <div class="tab off" id="tab-platforms" onclick="switchTab('platforms')">🔌 PLATFORMS</div>
  <div class="tab off" id="tab-alerts" onclick="switchTab('alerts')">🔔 ALERTS</div>
  <div class="tab off" id="tab-history" onclick="switchTab('history')">📈 HISTORY</div>
</div>
<main>
  <div id="page-dashboard"></div>
  <div id="page-platforms" style="display:none"></div>
  <div id="page-alerts" style="display:none"></div>
  <div id="page-history" style="display:none"></div>
</main>
<div id="modal" class="overlay" style="display:none">
  <div class="modal card" id="modalContent"></div>
</div>
<script>
const API_BASE='https://usdt-arb-backend.onrender.com';

const PLATFORMS=[
  {id:'wazirx', name:'WazirX',      flag:'🇮🇳', color:'#1a73e8', keys:['api_key','secret_key'],              doc:'https://docs.wazirx.com'},
  {id:'coindcx',name:'CoinDCX',     flag:'🇮🇳', color:'#00c2ff', keys:['api_key','secret_key'],              doc:'https://docs.coindcx.com'},
  {id:'zebpay', name:'ZebPay',      flag:'🇮🇳', color:'#ff6b35', keys:['api_key'],                           doc:'https://zebpay.com/api-docs'},
  {id:'binance',name:'Binance P2P', flag:'🌍',  color:'#f0b90b', keys:['api_key','secret_key'],              doc:'https://binance-docs.github.io'},
  {id:'bybit',  name:'Bybit P2P',   flag:'🌍',  color:'#f7a600', keys:['api_key','api_secret'],              doc:'https://bybit-exchange.github.io/docs'},
  {id:'kucoin', name:'KuCoin',      flag:'🌍',  color:'#00c8a0', keys:['api_key','secret_key','passphrase'], doc:'https://docs.kucoin.com'},
  {id:'okx',    name:'OKX',         flag:'🌍',  color:'#ffffff', keys:['api_key','secret_key','passphrase'], doc:'https://www.okx.com/docs-v5'},
  {id:'bitget', name:'Bitget',      flag:'🌍',  color:'#00cfa8', keys:['api_key','secret_key','passphrase'], doc:'https://bitgetlimited.github.io/apidoc'},
];

const MOCK={
  wazirx: {buy:87.42,sell:87.68,latency:120},
  coindcx:{buy:87.15,sell:87.55,latency:95},
  zebpay: {buy:87.80,sell:88.10,latency:210},
  binance:{buy:86.90,sell:87.30,latency:180},
  bybit:  {buy:87.05,sell:87.45,latency:145},
  kucoin: {buy:87.35,sell:87.72,latency:160},
  okx:    {buy:87.20,sell:87.58,latency:130},
  bitget: {buy:87.10,sell:87.50,latency:155},
};

let state={
  connected:{},prices:{},loading:{},
  creds:JSON.parse(localStorage.getItem('uarb_creds')||'{}'),
  autoRefresh:false,refreshSec:10,
  alerts:[],history:[],tradeAmt:10000,
  alertThreshold:0.50,backendOnline:false,
  currentTab:'dashboard',timer:null
};

fetch(API_BASE+'/health',{signal:AbortSignal.timeout(3000)})
  .then(r=>{if(r.ok){state.backendOnline=true;document.getElementById('modeLabel').textContent='● LIVE';document.getElementById('modeLabel').style.color='#00ff9d';}})
  .catch(()=>{});

function noise(v){return +(v+(Math.random()-.5)*.28).toFixed(2)}

async function fetchAll(){
  const active=PLATFORMS.filter(p=>state.connected[p.id]);
  if(!active.length)return;
  active.forEach(async p=>{
    state.loading[p.id]=true;
    if(state.backendOnline){
      try{
        const r=await fetch(API_BASE+'/api/prices/'+p.id,{signal:AbortSignal.timeout(8000)});
        const j=await r.json();
        if(j.status==='ok') state.prices[p.id]=j;
      }catch(e){}
      state.loading[p.id]=false;
      renderDashboard();
    }else{
      const b=MOCK[p.id];
      setTimeout(()=>{
        state.prices[p.id]={buy:noise(b.buy),sell:noise(b.sell),latency:b.latency+Math.floor(Math.random()*40),status:'ok'};
        state.loading[p.id]=false;
        renderDashboard();
      },b.latency);
    }
  });
  const now=new Date();
  document.getElementById('lastUpdated').innerHTML='<span style="color:#00ff9d">UPDATED</span> '+now.toLocaleTimeString();
  state.history.push({time:now,prices:JSON.parse(JSON.stringify(state.prices))});
  if(state.history.length>50)state.history.shift();
  checkAlerts();
  renderDashboard();
}

function checkAlerts(){
  const active=Object.entries(state.prices).filter(([id])=>state.connected[id]);
  if(active.length<2)return;
  const cheapBuy=active.reduce((a,b)=>a[1].buy<b[1].buy?a:b);
  const highSell=active.reduce((a,b)=>a[1].sell>b[1].sell?a:b);
  const spread=highSell[1].sell-cheapBuy[1].buy;
  if(spread>=state.alertThreshold){
    state.alerts.unshift({time:new Date(),buyId:cheapBuy[0],buyPrice:cheapBuy[1].buy,sellId:highSell[0],sellPrice:highSell[1].sell,spread:spread.toFixed(2)});
    if(state.alerts.length>50)state.alerts.pop();
    document.getElementById('tab-alerts').textContent='🔔 ALERTS ('+state.alerts.length+')';
  }
}

function toggleAuto(){
  state.autoRefresh=!state.autoRefresh;
  clearInterval(state.timer);
  const dot=document.getElementById('autoDot');
  const lbl=document.getElementById('autoLabel');
  if(state.autoRefresh){
    dot.style.background='#00ff9d';dot.style.boxShadow='0 0 8px #00ff9d';dot.classList.add('pulse');
    lbl.style.color='#00ff9d';lbl.textContent='AUTO '+state.refreshSec+'s';
    state.timer=setInterval(fetchAll,state.refreshSec*1000);
  }else{
    dot.style.background='#333';dot.style.boxShadow='none';dot.classList.remove('pulse');
    lbl.style.color='#444';lbl.textContent='PAUSED';
  }
}

function switchTab(t){
  state.currentTab=t;
  ['dashboard','platforms','alerts','history'].forEach(x=>{
    document.getElementById('tab-'+x).className='tab '+(x===t?'on':'off');
    document.getElementById('page-'+x).style.display=x===t?'':'none';
  });
  if(t==='dashboard')renderDashboard();
  if(t==='platforms')renderPlatforms();
  if(t==='alerts')renderAlerts();
  if(t==='history')renderHistory();
}

function renderDashboard(){
  if(state.currentTab!=='dashboard')return;
  const connCount=Object.values(state.connected).filter(Boolean).length;
  document.getElementById('platformCount').textContent=connCount+' PLATFORMS ACTIVE';
  const active=PLATFORMS.filter(p=>state.connected[p.id]&&state.prices[p.id]).map(p=>({...p,data:state.prices[p.id]}));
  const el=document.getElementById('page-dashboard');
  if(!active.length){
    el.innerHTML='<div style="text-align:center;padding:80px 20px"><div style="font-size:48px;margin-bottom:16px">🔌</div><div class="raj" style="font-size:20px;color:#00ff9d;margin-bottom:8px;font-weight:700">No Platforms Connected</div><div style="font-size:12px;color:#444;margin-bottom:24px">Go to PLATFORMS tab and connect exchanges</div><button class="btn btn-g" onclick="switchTab(\'platforms\')">→ CONNECT NOW</button></div>';
    return;
  }
  const sortBuy=[...active].sort((a,b)=>a.data.buy-b.data.buy);
  const sortSell=[...active].sort((a,b)=>b.data.sell-a.data.sell);
  const bestBuy=sortBuy[0],bestSell=sortSell[0];
  const spread=bestSell.data.sell-bestBuy.data.buy;
  const spreadPct=((spread/bestBuy.data.buy)*100).toFixed(3);
  const profit=((state.tradeAmt/bestBuy.data.buy)*spread).toFixed(0);
  const amtBtns=[5000,10000,25000,50000,100000].map(v=>'<button class="btn" onclick="setAmt('+v+')" style="background:'+(state.tradeAmt===v?'rgba(0,255,157,0.15)':'rgba(255,255,255,0.04)')+';border:1px solid '+(state.tradeAmt===v?'rgba(0,255,157,0.4)':'rgba(255,255,255,0.08)')+';color:'+(state.tradeAmt===v?'#00ff9d':'#555')+';padding:3px 9px;font-size:10px;border-radius:3px">'+(v/1000)+'K</button>').join('');
  const buyRows=sortBuy.map((p,i)=>'<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:'+(i<sortBuy.length-1?'1px solid rgba(255,255,255,0.04)':'none')+'"><div style="display:flex;align-items:center;gap:8px"><div class="badge" style="background:'+(i===0?'rgba(0,255,157,0.18)':'rgba(255,255,255,0.04)')+';color:'+(i===0?'#00ff9d':'#444')+';border:1px solid '+(i===0?'rgba(0,255,157,0.4)':'rgba(255,255,255,0.08)')+'">'+(i+1)+'</div><div class="raj" style="font-weight:600;font-size:13px;color:'+(i===0?'#fff':'#888')+'">'+p.flag+' '+p.name+'</div></div><div style="text-align:right"><div style="color:'+(i===0?'#00ff9d':'#777')+';font-size:15px">₹'+p.data.buy.toFixed(2)+'</div>'+(i>0?'<div style="font-size:9px;color:#ff5555">+₹'+(p.data.buy-sortBuy[0].data.buy).toFixed(2)+'</div>':'<div style="font-size:9px;color:#00cc7a">BEST</div>')+'</div></div>').join('');
  const sellRows=sortSell.map((p,i)=>'<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:'+(i<sortSell.length-1?'1px solid rgba(255,255,255,0.04)':'none')+'"><div style="display:flex;align-items:center;gap:8px"><div class="badge" style="background:'+(i===0?'rgba(255,215,0,0.18)':'rgba(255,255,255,0.04)')+';color:'+(i===0?'#ffd700':'#444')+';border:1px solid '+(i===0?'rgba(255,215,0,0.4)':'rgba(255,255,255,0.08)')+'">'+(i+1)+'</div><div class="raj" style="font-weight:600;font-size:13px;color:'+(i===0?'#fff':'#888')+'">'+p.flag+' '+p.name+'</div></div><div style="text-align:right"><div style="color:'+(i===0?'#ffd700':'#777')+';font-size:15px">₹'+p.data.sell.toFixed(2)+'</div>'+(i>0?'<div style="font-size:9px;color:#ff5555">-₹'+(sortSell[0].data.sell-p.data.sell).toFixed(2)+'</div>':'<div style="font-size:9px;color:#cc9900">BEST</div>')+'</div></div>').join('');
  const tableRows=active.map(p=>{
    const bR=sortBuy.findIndex(x=>x.id===p.id)+1;
    const sR=sortSell.findIndex(x=>x.id===p.id)+1;
    return'<tr style="border-bottom:1px solid rgba(255,255,255,0.025)"><td><div class="raj" style="font-weight:600;font-size:13px">'+p.flag+' '+p.name+'</div></td><td><div style="color:'+(bR===1?'#00ff9d':'#aaa')+'">₹'+p.data.buy.toFixed(2)+'</div></td><td><div style="color:'+(sR===1?'#ffd700':'#aaa')+'">₹'+p.data.sell.toFixed(2)+'</div></td><td><div style="color:#00cc7a">₹'+(p.data.sell-p.data.buy).toFixed(2)+'</div></td><td><div class="badge" style="background:'+(bR===1?'rgba(0,255,157,0.15)':'rgba(255,255,255,0.04)')+';color:'+(bR===1?'#00ff9d':'#555')+';border:1px solid rgba(255,255,255,0.08)">#'+bR+'</div></td><td><div class="badge" style="background:'+(sR===1?'rgba(255,215,0,0.15)':'rgba(255,255,255,0.04)')+';color:'+(sR===1?'#ffd700':'#555')+';border:1px solid rgba(255,255,255,0.08)">#'+sR+'</div></td><td><div style="font-size:11px;color:'+(p.data.latency<150?'#00ff9d':p.data.latency<200?'#ffd700':'#ff5555')+'">'+(state.loading[p.id]?'…':p.data.latency+'ms')+'</div></td></tr>';
  }).join('');
  el.innerHTML='<div class="card slide" style="padding:18px 20px;margin-bottom:20px;border-color:rgba(0,255,157,0.25);background:linear-gradient(135deg,rgba(0,255,157,0.04),rgba(0,204,122,0.01))"><div style="font-size:9px;color:#555;margin-bottom:8px;letter-spacing:1px">◈ BEST ARBITRAGE OPPORTUNITY RIGHT NOW</div><div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px"><div class="raj" style="font-size:18px;font-weight:700;line-height:1.5"><span style="color:#00ff9d">BUY</span> <span style="color:#444">on</span> <span style="color:#fff">'+bestBuy.name+'</span> <span style="color:#333">@</span> <span style="color:#cdd6f4">₹'+bestBuy.data.buy.toFixed(2)+'</span> <span style="color:#00ff9d;margin:0 10px">→</span> <span style="color:#ffd700">SELL</span> <span style="color:#444">on</span> <span style="color:#fff">'+bestSell.name+'</span> <span style="color:#333">@</span> <span style="color:#cdd6f4">₹'+bestSell.data.sell.toFixed(2)+'</span></div><div style="text-align:right"><div style="font-size:9px;color:#555">MAX SPREAD</div><div class="raj" style="font-size:36px;font-weight:800;color:#00ff9d;text-shadow:0 0 12px rgba(0,255,157,.5)">₹'+spread.toFixed(2)+'</div><div style="font-size:11px;color:#00cc7a">+'+spreadPct+'% margin</div></div></div><div style="margin-top:12px;padding:8px 12px;background:rgba(0,0,0,0.3);border-radius:4px;display:flex;align-items:center;gap:16px;flex-wrap:wrap"><div style="font-size:10px;color:#555">TRADE AMOUNT:</div><div style="display:flex;gap:5px">'+amtBtns+'</div><div style="font-size:11px;color:#00ff9d">Profit ≈ <span style="font-size:14px;font-weight:700">₹'+profit+'</span> <span style="color:#444;font-size:10px">(before fees)</span></div></div></div><div class="grid2" style="margin-bottom:20px"><div class="card" style="padding:18px"><div style="font-size:10px;color:#00ff9d;margin-bottom:14px;letter-spacing:.5px">⬇ CHEAPEST TO BUY</div>'+buyRows+'</div><div class="card" style="padding:18px"><div style="font-size:10px;color:#ffd700;margin-bottom:14px;letter-spacing:.5px">⬆ HIGHEST TO SELL</div>'+sellRows+'</div></div><div class="card" style="padding:18px;overflow-x:auto"><div style="font-size:10px;color:#444;margin-bottom:14px">◈ FULL COMPARISON TABLE</div><table><thead><tr style="border-bottom:1px solid rgba(0,255,157,0.12)"><th style="font-size:9px;color:#444;font-weight:normal">PLATFORM</th><th style="font-size:9px;color:#444;font-weight:normal">BUY (₹)</th><th style="font-size:9px;color:#444;font-weight:normal">SELL (₹)</th><th style="font-size:9px;color:#444;font-weight:normal">SPREAD</th><th style="font-size:9px;color:#444;font-weight:normal">BUY RANK</th><th style="font-size:9px;color:#444;font-weight:normal">SELL RANK</th><th style="font-size:9px;color:#444;font-weight:normal">LATENCY</th></tr></thead><tbody>'+tableRows+'</tbody></table></div>';
}
  function renderPlatforms(){
  const el=document.getElementById('page-platforms');
  const warning=!state.backendOnline?'<div style="padding:10px 14px;background:rgba(255,215,0,0.06);border:1px solid rgba(255,215,0,0.2);border-radius:5px;margin-bottom:16px;font-size:11px;color:#999">⚠ Backend not detected. Running in <strong style="color:#ffd700">demo mode</strong> with mock prices.</div>':'';
  const cards=PLATFORMS.map(p=>{
    const isConn=!!state.connected[p.id];
    const priceBox=state.prices[p.id]?'<div style="display:flex;gap:16px;padding:7px 12px;background:rgba(0,255,157,0.04);border-radius:4px;margin-bottom:10px"><div><div style="font-size:8px;color:#444">BUY</div><div style="color:#00ff9d;font-size:13px">₹'+state.prices[p.id].buy.toFixed(2)+'</div></div><div><div style="font-size:8px;color:#444">SELL</div><div style="color:#ffd700;font-size:13px">₹'+state.prices[p.id].sell.toFixed(2)+'</div></div></div>':'';
    const btns=isConn?'<div style="display:flex;gap:8px"><button class="btn btn-ghost" style="flex:1" onclick="openModal(\''+p.id+'\')">EDIT KEYS</button><button class="btn btn-danger" onclick="disconnect(\''+p.id+'\')">DISCONNECT</button></div>':'<button class="btn btn-g" style="width:100%" onclick="openModal(\''+p.id+'\')">+ CONNECT '+p.name.toUpperCase()+'</button>';
    return'<div class="card" style="padding:18px;border-color:'+(isConn?'rgba(0,255,157,0.22)':'rgba(255,255,255,0.06)')+'"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="display:flex;align-items:center;gap:10px"><div style="width:36px;height:36px;border-radius:8px;background:'+p.color+'18;border:1px solid '+p.color+'33;display:flex;align-items:center;justify-content:center;font-size:18px">'+p.flag+'</div><div><div class="raj" style="font-weight:700;font-size:15px">'+p.name+'</div><div style="font-size:9px;color:#333">'+p.keys.join(' + ').toUpperCase()+'</div></div></div><div style="width:10px;height:10px;border-radius:50%;background:'+(isConn?'#00ff9d':'#222')+';box-shadow:'+(isConn?'0 0 8px #00ff9d':'none')+'" class="'+(isConn?'pulse':'')+'"></div></div>'+priceBox+btns+'</div>';
  }).join('');
  const refreshBtns=[5,10,30,60].map(s=>'<button class="btn" onclick="setRefresh('+s+')" style="background:'+(state.refreshSec===s?'rgba(0,255,157,0.12)':'rgba(255,255,255,0.04)')+';border:1px solid '+(state.refreshSec===s?'rgba(0,255,157,0.35)':'rgba(255,255,255,0.07)')+';color:'+(state.refreshSec===s?'#00ff9d':'#555')+';padding:4px 10px;border-radius:3px">'+s+'s</button>').join('');
  el.innerHTML=warning+'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:20px">'+cards+'</div><div class="card" style="padding:18px"><div style="font-size:10px;color:#444;margin-bottom:14px">⚙ REFRESH SETTINGS</div><div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap"><label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" '+(state.autoRefresh?'checked':'')+' onchange="toggleAuto()"><span style="font-size:12px;color:#aaa">Auto-Refresh</span></label><div style="display:flex;align-items:center;gap:8px"><span style="font-size:10px;color:#444">INTERVAL:</span>'+refreshBtns+'</div></div></div>';
}

function renderAlerts(){
  const el=document.getElementById('page-alerts');
  const rows=state.alerts.map(a=>'<div class="card slide" style="padding:11px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:7px"><div style="font-size:12px">🔔 Spread <span style="color:#00ff9d">₹'+a.spread+'</span> · Buy <span style="color:#00ff9d">'+(PLATFORMS.find(x=>x.id===a.buyId)||{}).name+'</span> @ ₹'+a.buyPrice.toFixed(2)+' → Sell <span style="color:#ffd700">'+(PLATFORMS.find(x=>x.id===a.sellId)||{}).name+'</span> @ ₹'+a.sellPrice.toFixed(2)+'</div><div style="font-size:10px;color:#444;white-space:nowrap">'+a.time.toLocaleTimeString()+'</div></div>').join('');
  el.innerHTML='<div class="card" style="padding:18px;margin-bottom:18px"><div style="font-size:10px;color:#444;margin-bottom:12px">🔔 SPREAD ALERT THRESHOLD</div><div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap"><input type="range" min="0.05" max="3" step="0.05" value="'+state.alertThreshold+'" oninput="state.alertThreshold=parseFloat(this.value);document.getElementById(\'threshVal\').textContent=\'₹\'+parseFloat(this.value).toFixed(2)" style="flex:1;min-width:150px"><div id="threshVal" style="color:#00ff9d;font-size:16px;min-width:60px">₹'+state.alertThreshold.toFixed(2)+'</div></div></div>'+(state.alerts.length===0?'<div style="text-align:center;padding:60px 20px"><div style="font-size:36px;margin-bottom:12px">🔕</div><div style="color:#333;font-size:12px">No alerts yet. Connect 2+ platforms to monitor.</div></div>':'<button class="btn btn-ghost" onclick="state.alerts=[];renderAlerts()" style="margin-bottom:12px">CLEAR ALL</button>'+rows);
}

function renderHistory(){
  const el=document.getElementById('page-history');
  if(!state.history.length){
    el.innerHTML='<div style="text-align:center;padding:60px 20px"><div style="font-size:36px;margin-bottom:12px">📈</div><div style="color:#333;font-size:12px">Snapshots appear here as data refreshes.</div></div>';
    return;
  }
  const rows=[...state.history].reverse().map(snap=>{
    const prices=Object.entries(snap.prices).filter(([id])=>state.connected[id]).map(([id,d])=>'<span style="margin-right:12px"><span style="color:#555;font-size:10px">'+(PLATFORMS.find(x=>x.id===id)||{}).name+':</span> <span style="color:#00ff9d">₹'+d.buy.toFixed(2)+'</span><span style="color:#333">/</span><span style="color:#ffd700">₹'+d.sell.toFixed(2)+'</span></span>').join('');
    return'<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03);display:flex;gap:12px;flex-wrap:wrap;align-items:center"><div style="font-size:10px;color:#444;min-width:75px">'+snap.time.toLocaleTimeString()+'</div><div>'+prices+'</div></div>';
  }).join('');
  el.innerHTML='<div class="card" style="padding:18px;max-height:500px;overflow-y:auto"><div style="font-size:10px;color:#444;margin-bottom:14px">LAST '+state.history.length+' SNAPSHOTS</div>'+rows+'</div>';
}

let modalPlatform=null;
function openModal(id){
  modalPlatform=PLATFORMS.find(p=>p.id===id);
  const p=modalPlatform;
  const fields=p.keys.map(k=>'<div style="margin-bottom:14px"><div style="font-size:9px;color:#555;margin-bottom:6px;letter-spacing:.5px">'+k.toUpperCase()+'</div><input class="inp" type="password" id="field_'+k+'" placeholder="Enter '+k+'…" value="'+((state.creds[id]||{})[k]||'')+'"></div>').join('');
  document.getElementById('modalContent').innerHTML='<div class="raj" style="font-size:20px;font-weight:700;color:#00ff9d;margin-bottom:4px">'+p.flag+' Connect '+p.name+'</div><div style="font-size:9px;color:#333;margin-bottom:22px;letter-spacing:.5px">KEYS STORED ONLY IN YOUR BROWSER</div>'+fields+'<div style="font-size:10px;color:#2a2a2a;line-height:1.7;margin-bottom:18px">⚠ Use READ-ONLY API keys. No trades executed.<br>Binance P2P and Bybit P2P work without keys.</div><div style="display:flex;gap:10px"><button class="btn btn-g" style="flex:1;padding:11px" onclick="saveCreds(\''+id+'\')">CONNECT & FETCH PRICES</button><button class="btn btn-ghost" onclick="closeModal()">CANCEL</button></div><a href="'+p.doc+'" target="_blank" style="font-size:10px;color:#333;display:block;text-align:center;margin-top:14px;text-decoration:none">📄 '+p.name+' API docs →</a>';
  document.getElementById('modal').style.display='flex';
}

function saveCreds(id){
  const p=PLATFORMS.find(x=>x.id===id);
  const keys={};
  p.keys.forEach(k=>{keys[k]=document.getElementById('field_'+k).value});
  state.creds[id]=keys;
  localStorage.setItem('uarb_creds',JSON.stringify(state.creds));
  state.connected[id]=true;
  closeModal();
  fetchAll();
  if(state.currentTab==='platforms')renderPlatforms();
}

function disconnect(id){
  state.connected[id]=false;
  delete state.prices[id];
  renderPlatforms();
  renderDashboard();
}

function closeModal(){
  document.getElementById('modal').style.display='none';
  modalPlatform=null;
}

function setAmt(v){state.tradeAmt=v;renderDashboard()}
function setRefresh(s){
  state.refreshSec=s;
  if(state.autoRefresh){
    clearInterval(state.timer);
    state.timer=setInterval(fetchAll,s*1000);
    document.getElementById('autoLabel').textContent='AUTO '+s+'s';
  }
  renderPlatforms();
}

document.getElementById('modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('modal'))closeModal();
});

renderDashboard();
</script>
</body>
</html>
